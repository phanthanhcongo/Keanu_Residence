teardown-staging:
  <<: *deploy_template
  stage: teardown
  environment:
    name: staging
    action: stop
  script:
    - |
      ssh root@$STAGING_SERVER_IP bash -s <<REMOTE_SCRIPT
        cd $DEPLOY_PATH
        docker compose -f docker-compose.prod.yml down --remove-orphans
        echo "✅ STAGING environment torn down"
      REMOTE_SCRIPT
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
