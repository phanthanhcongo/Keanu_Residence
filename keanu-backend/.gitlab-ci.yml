# keanu Backend GitLab CI/CD Pipeline
# NestJS application with Docker Compose deployment via SSH
# Dev: 183.91.11.149 | Staging: 103.164.35.132

stages:
  - test
  - deploy-dev
  - deploy-staging
  - teardown

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: '/certs'
  # Image names (using GitLab Container Registry)
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/keanu-backend
  # Default branch for production deployments
  PRODUCTION_BRANCH: main
  # Server IPs
  DEV_SERVER_IP: 183.91.11.149
  STAGING_SERVER_IP: 183.91.11.149
  # Deployment path on servers
  DEPLOY_PATH: /opt/keanu/be

