<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" fill="none">
  <rect width="900" height="600" fill="#F0EFEB"/>

  <!-- Outer walls -->
  <rect x="60" y="40" width="780" height="520" stroke="#3A3A3A" stroke-width="3" fill="none"/>

  <!-- Main horizontal divider (upper/lower zones) -->
  <line x1="60" y1="300" x2="840" y2="300" stroke="#3A3A3A" stroke-width="2.5"/>

  <!-- Upper zone vertical dividers -->
  <line x1="280" y1="40" x2="280" y2="300" stroke="#3A3A3A" stroke-width="2"/>
  <line x1="520" y1="40" x2="520" y2="300" stroke="#3A3A3A" stroke-width="2"/>

  <!-- Lower zone vertical dividers -->
  <line x1="340" y1="300" x2="340" y2="560" stroke="#3A3A3A" stroke-width="2"/>
  <line x1="580" y1="300" x2="580" y2="560" stroke="#3A3A3A" stroke-width="2"/>

  <!-- Bedroom 1 (top-left) -->
  <text x="170" y="155" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="11" fill="#888" letter-spacing="0.1em" text-transform="uppercase">BEDROOM 1</text>
  <text x="170" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#AAA">En-suite</text>
  <!-- En-suite partition -->
  <line x1="100" y1="200" x2="240" y2="200" stroke="#3A3A3A" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="110" y="210" width="50" height="30" stroke="#AAA" stroke-width="0.8" fill="none" rx="2"/>
  <rect x="170" y="215" width="25" height="20" stroke="#AAA" stroke-width="0.8" fill="none" rx="2"/>

  <!-- Bedroom 2 (top-center) -->
  <text x="400" y="155" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="11" fill="#888" letter-spacing="0.1em">BEDROOM 2</text>
  <text x="400" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#AAA">En-suite</text>
  <line x1="320" y1="200" x2="480" y2="200" stroke="#3A3A3A" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="340" y="210" width="50" height="30" stroke="#AAA" stroke-width="0.8" fill="none" rx="2"/>
  <rect x="400" y="215" width="25" height="20" stroke="#AAA" stroke-width="0.8" fill="none" rx="2"/>

  <!-- Bedroom 3 (top-right) -->
  <text x="680" y="100" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="11" fill="#888" letter-spacing="0.1em">BEDROOM 3</text>
  <text x="680" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#AAA">En-suite</text>
  <line x1="560" y1="155" x2="800" y2="155" stroke="#3A3A3A" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="580" y="165" width="50" height="30" stroke="#AAA" stroke-width="0.8" fill="none" rx="2"/>
  <rect x="650" y="170" width="25" height="20" stroke="#AAA" stroke-width="0.8" fill="none" rx="2"/>

  <!-- Bedroom 4 / Master (top-right lower) -->
  <text x="680" y="240" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="11" fill="#888" letter-spacing="0.1em">MASTER SUITE</text>
  <text x="680" y="260" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#AAA">En-suite</text>
  <rect x="580" y="270" width="60" height="25" stroke="#AAA" stroke-width="0.8" fill="none" rx="2"/>
  <rect x="660" y="272" width="30" height="20" stroke="#AAA" stroke-width="0.8" fill="none" rx="2"/>

  <!-- Living Area (bottom-left) -->
  <text x="200" y="410" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="12" fill="#888" letter-spacing="0.15em">LIVING AREA</text>
  <text x="200" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#AAA">Open Plan</text>
  <!-- Sofa shapes -->
  <rect x="120" y="450" width="80" height="25" stroke="#BBB" stroke-width="0.8" fill="none" rx="3"/>
  <rect x="220" y="440" width="25" height="45" stroke="#BBB" stroke-width="0.8" fill="none" rx="3"/>
  <!-- Coffee table -->
  <rect x="160" y="460" width="40" height="20" stroke="#BBB" stroke-width="0.8" fill="#E8E7E3" rx="2"/>

  <!-- Kitchen + Dining (bottom-center) -->
  <text x="460" y="380" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="11" fill="#888" letter-spacing="0.1em">KITCHEN</text>
  <!-- Kitchen counter -->
  <rect x="370" y="400" width="170" height="15" stroke="#AAA" stroke-width="1" fill="#E8E7E3" rx="1"/>
  <text x="460" y="460" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="10" fill="#888" letter-spacing="0.1em">DINING</text>
  <!-- Dining table -->
  <ellipse cx="460" cy="490" rx="45" ry="25" stroke="#BBB" stroke-width="0.8" fill="none"/>
  <!-- Chairs -->
  <circle cx="415" cy="490" r="5" stroke="#BBB" stroke-width="0.6" fill="none"/>
  <circle cx="505" cy="490" r="5" stroke="#BBB" stroke-width="0.6" fill="none"/>
  <circle cx="460" cy="465" r="5" stroke="#BBB" stroke-width="0.6" fill="none"/>
  <circle cx="460" cy="515" r="5" stroke="#BBB" stroke-width="0.6" fill="none"/>
  <circle cx="430" cy="472" r="5" stroke="#BBB" stroke-width="0.6" fill="none"/>
  <circle cx="490" cy="472" r="5" stroke="#BBB" stroke-width="0.6" fill="none"/>

  <!-- Terrace / Pool Area (bottom-right) -->
  <text x="710" y="380" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="11" fill="#888" letter-spacing="0.1em">TERRACE</text>
  <!-- Pool -->
  <rect x="620" y="410" width="180" height="80" rx="6" stroke="#8CABBF" stroke-width="1.5" fill="#D4E4ED"/>
  <text x="710" y="456" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6B8FA3">18m INFINITY POOL</text>

  <!-- Covered Pavilion indicator -->
  <text x="710" y="530" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="10" fill="#888" letter-spacing="0.1em">COVERED PAVILION</text>
  <rect x="630" y="510" width="160" height="30" stroke="#BBB" stroke-width="0.8" fill="none" stroke-dasharray="4,3" rx="2"/>

  <!-- Door openings (gaps in walls) -->
  <!-- Door from Bedroom 1 -->
  <line x1="200" y1="300" x2="240" y2="300" stroke="#F0EFEB" stroke-width="4"/>
  <path d="M 200 300 A 40 40 0 0 1 240 300" stroke="#AAA" stroke-width="0.6" fill="none" stroke-dasharray="3,2"/>

  <!-- Door from Bedroom 2 -->
  <line x1="420" y1="300" x2="460" y2="300" stroke="#F0EFEB" stroke-width="4"/>
  <path d="M 420 300 A 40 40 0 0 1 460 300" stroke="#AAA" stroke-width="0.6" fill="none" stroke-dasharray="3,2"/>

  <!-- Door to Terrace -->
  <line x1="580" y1="400" x2="580" y2="450" stroke="#F0EFEB" stroke-width="4"/>

  <!-- Door Living to Kitchen -->
  <line x1="340" y1="400" x2="340" y2="440" stroke="#F0EFEB" stroke-width="4"/>

  <!-- Dimension lines -->
  <!-- Top width -->
  <line x1="60" y1="25" x2="840" y2="25" stroke="#CCC" stroke-width="0.5"/>
  <line x1="60" y1="20" x2="60" y2="30" stroke="#CCC" stroke-width="0.5"/>
  <line x1="840" y1="20" x2="840" y2="30" stroke="#CCC" stroke-width="0.5"/>
  <text x="450" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#AAA">28.5m</text>

  <!-- Left height -->
  <line x1="45" y1="40" x2="45" y2="560" stroke="#CCC" stroke-width="0.5"/>
  <line x1="40" y1="40" x2="50" y2="40" stroke="#CCC" stroke-width="0.5"/>
  <line x1="40" y1="560" x2="50" y2="560" stroke="#CCC" stroke-width="0.5"/>
  <text x="43" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#AAA" transform="rotate(-90,43,305)">19.0m</text>

  <!-- Scale bar -->
  <line x1="700" y1="580" x2="800" y2="580" stroke="#888" stroke-width="1"/>
  <line x1="700" y1="576" x2="700" y2="584" stroke="#888" stroke-width="1"/>
  <line x1="800" y1="576" x2="800" y2="584" stroke="#888" stroke-width="1"/>
  <text x="750" y="594" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#888">5m</text>

  <!-- Title block -->
  <text x="80" y="585" font-family="Montserrat, sans-serif" font-size="9" fill="#888" letter-spacing="0.15em">VILLA 04 — GROUND FLOOR</text>
  <text x="80" y="597" font-family="Inter, sans-serif" font-size="7" fill="#AAA">540 SQ M  |  KEANU RESIDENCES BALI</text>

  <!-- North arrow -->
  <g transform="translate(860, 50)">
    <polygon points="0,-18 5,0 -5,0" fill="#888"/>
    <line x1="0" y1="0" x2="0" y2="10" stroke="#888" stroke-width="1"/>
    <text x="0" y="-22" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#888">N</text>
  </g>
</svg>
